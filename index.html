<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio Jurídico - Agendamiento de Consultas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); }
        .modal.active { display: flex; }
        .modal-content { background-color: #fefefe; margin: auto; padding: 20px; border-radius: 8px; max-width: 600px; width: 90%; }
        .fade-in { animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-active { border-bottom: 3px solid #3b82f6; }

        /* Tema general (mockup Material, escala de grises) */
        :root{
            --md-bg: #f5f5f5;
            --md-surface: #ffffff;
            --md-surface-2: #fafafa;
            --md-border: #e5e7eb;
            --md-text: #111827;
            --md-muted: #6b7280;
            --md-primary: #424242;
            --md-primary-2: #2f2f2f;
            --md-shadow: 0 2px 10px rgba(0,0,0,0.10);
            --md-radius: 14px;
        }

        body{ background: var(--md-bg) !important; color: var(--md-text); }

        /* Header: neutraliza el azul y lo deja genérico */
        header.bg-blue-900{ background: var(--md-surface) !important; color: var(--md-text) !important; box-shadow: var(--md-shadow) !important; }
        header.bg-blue-900 h1, header.bg-blue-900 button{ color: var(--md-text) !important; }
        header.bg-blue-900 button:hover{ opacity: .78; }

        /* Hero: elimina gradiente y lo deja sobrio */
        section.bg-gradient-to-r{ background: var(--md-surface) !important; color: var(--md-text) !important; border-bottom: 1px solid var(--md-border); }

        /* Tarjetas y contenedores */
        .shadow-lg, .shadow-md { box-shadow: var(--md-shadow) !important; }
        .rounded-lg { border-radius: var(--md-radius) !important; }
        .bg-white { background: var(--md-surface) !important; }
        .bg-gray-50, .bg-gray-100 { background: var(--md-surface-2) !important; }

        /* Texto: neutraliza azules */
        .text-blue-900, .text-blue-600, .text-blue-500{ color: var(--md-text) !important; }

        /* Botones: estilo Material genérico */
        button, .btn {
            border-radius: 999px;
        }
        .bg-blue-600, .bg-blue-500{
            background: var(--md-primary) !important;
            color: #fff !important;
        }
        .bg-blue-700{ background: var(--md-primary-2) !important; }
        .bg-yellow-500, .bg-yellow-400{ background: #e0e0e0 !important; color: var(--md-text) !important; }
        .bg-green-600, .bg-green-700{ background: #616161 !important; color: #fff !important; }
        .bg-red-600, .bg-red-500{ background: #757575 !important; color: #fff !important; }
        .bg-gray-300, .bg-gray-400{ background: #e5e7eb !important; color: var(--md-text) !important; }

        /* Inputs */
        input, select, textarea{
            border-color: var(--md-border) !important;
            border-radius: 12px !important;
        }
        input:focus, select:focus, textarea:focus{
            outline: none !important;
            box-shadow: 0 0 0 3px rgba(17,24,39,0.12) !important;
        }

        /* Footer neutral */
        footer.bg-gray-800{ background: #1f2937 !important; }

        /* Mockup WhatsApp (mantener) */
        .wa-phone { background: #0b141a; padding: 14px; border-radius: 22px; }
        .wa-frame { background: #111b21; border-radius: 18px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.06); }
        .wa-header { background: #202c33; color: #e9edef; }
        .wa-header .wa-subtitle { color: #8696a0; }
        .wa-chat { background: #0b141a; }
        .wa-wallpaper {
            background-image:
                radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-position: 0 0, 18px 18px;
            background-size: 36px 36px;
        }
        .wa-bubble { max-width: 78%; }
        .wa-in { background: #202c33; color: #e9edef; border-radius: 10px 10px 10px 0; }
        .wa-out { background: #005c4b; color: #e9edef; border-radius: 10px 10px 0 10px; }
        .wa-meta { color: rgba(233,237,239,0.72); font-size: 11px; }
        .wa-input { background: #202c33; }
        .wa-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); color: #e9edef; }
        .wa-btn:hover { background: rgba(255,255,255,0.10); }
        .wa-quick { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); color: #e9edef; }
        .wa-quick:hover { background: rgba(255,255,255,0.10); }
        .wa-scrollbar::-webkit-scrollbar { width: 10px; }
        .wa-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 999px; }
        .wa-scrollbar::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body class="font-roboto bg-gray-50">
    <div id="app"></div>

    <!-- Modal de Confirmación de Pago -->
    <div id="modalPago" class="modal">
        <div class="modal-content fade-in">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-blue-900">Confirmar Pago</h2>
                <button onclick="cerrarModal('modalPago')" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
            </div>
            <form onsubmit="procesarConfirmacionPago(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Número de Transacción</label>
                        <input type="text" id="inputTransaccion" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="Ej: TRX-2026-001234">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Monto Confirmado (CLP)</label>
                        <input type="number" id="inputMontoConfirmado" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="150000">
                    </div>
                    <div class="bg-blue-50 p-3 rounded-lg">
                        <p class="text-sm text-gray-700">Agendamiento ID: <span id="modalAgendamientoId" class="font-bold">-</span></p>
                        <p class="text-sm text-gray-700">Cliente: <span id="modalClienteNombre" class="font-bold">-</span></p>
                    </div>
                </div>
                <div class="flex gap-3 mt-6">
                    <button type="submit" class="flex-1 bg-green-600 text-white py-2 rounded-lg font-semibold hover:bg-green-700">Confirmar Pago</button>
                    <button type="button" onclick="cerrarModal('modalPago')" class="flex-1 bg-gray-300 text-gray-700 py-2 rounded-lg font-semibold hover:bg-gray-400">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal de Cotización -->
    <div id="modalCotizacion" class="modal">
        <div class="modal-content fade-in max-w-2xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-blue-900">Generar Cotización</h2>
                <button onclick="cerrarModal('modalCotizacion')" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
            </div>
            <form onsubmit="generarCotizacion(event)">
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Cliente</label>
                            <input type="text" id="cotClienteNombre" class="w-full px-3 py-2 border border-gray-300 rounded-lg" placeholder="Nombre completo">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                            <input type="email" id="cotClienteEmail" class="w-full px-3 py-2 border border-gray-300 rounded-lg" placeholder="correo@ejemplo.com">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Descripción del Trabajo</label>
                        <textarea id="cotDescripcion" rows="4" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="Detalles de la cotización"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Costo (CLP)</label>
                            <input type="number" id="cotCosto" required min="0" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="0">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Plazo</label>
                            <input type="text" id="cotPlazo" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="15 días hábiles">
                        </div>
                    </div>
                </div>
                <div class="flex gap-3 mt-6">
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700">Enviar Cotización</button>
                    <button type="button" onclick="cerrarModal('modalCotizacion')" class="flex-1 bg-gray-300 text-gray-700 py-2 rounded-lg font-semibold hover:bg-gray-400">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Gestión (Reagendar / Cancelar) -->
    <div id="modalGestion" class="modal" aria-hidden="true">
        <div class="modal-content fade-in max-w-xl">
            <div id="modalGestionBody"></div>
        </div>
    </div>

    <!-- Modal Detalle de Agendamiento (Admin: Historial/Calendario) -->
    <div id="modalDetalleAgendamiento" class="modal" aria-hidden="true">
        <div class="modal-content fade-in max-w-xl">
            <div id="modalDetalleAgendamientoBody"></div>
        </div>
    </div>

    <!-- Modal Confirmación (genérico) -->
    <div id="modalConfirm" class="modal" aria-hidden="true">
        <div class="modal-content fade-in max-w-md">
            <div id="modalConfirmBody"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/components.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/whatsapp.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
